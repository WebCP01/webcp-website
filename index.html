<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webcp.network</title>
  <link rel="icon" href="favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #081c2c;
      color: white;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
    }

    .text {
      z-index: 2;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 600;
    }

    .shapes {
      position: absolute;
      right: 0;
      top: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
    }

    .blue {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #3bc1ff, transparent 70%);
      top: 5%;
      right: 30%;
    }

    .light {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #88ffff, transparent 70%);
      top: 15%;
      right: 10%;
    }

    .orange {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #ff7a18, transparent 70%);
      bottom: 10%;
      right: 5%;
    }

    .pink {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #ff0066, transparent 70%);
      bottom: 0;
      right: 20%;
    }

    .circle {
      animation: float 12s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-30px); }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .shapes {
        width: 100%;
        opacity: 0.5;
      }
    }

  </style>
</head>
<body>
<main>
  <div class="container">
    <div class="text">
      <h1>webcp network</h1>
    </div>
  </div>
</main>
  <div class="shapes">
    <div class="circle blue"></div>
    <div class="circle light"></div>
    <div class="circle orange"></div>
    <div class="circle pink"></div>
  </div>

</body>
</html>
