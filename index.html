
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webcp.network</title>
  <link rel="icon" href="favicon.ico">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #081c2c;
      color: white;
      overflow: hidden;
    }

    main {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 600;
    }

    /* Shapes */
    .shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      animation: float 12s ease-in-out infinite alternate;
    }

    .blue {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #3bc1ff, transparent 70%);
      top: 5%;
      right: 30%;
    }

    .light {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #88ffff, transparent 70%);
      top: 15%;
      right: 10%;
    }

    .orange {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #ff7a18, transparent 70%);
      bottom: 10%;
      right: 5%;
    }

    .pink {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #ff0066, transparent 70%);
      bottom: 0;
      right: 20%;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-30px); }
    }

  </style>
</head>
<body>

  <div class="shapes" aria-hidden="true">
    <div class="circle blue"></div>
    <div class="circle light"></div>
    <div class="circle orange"></div>
    <div class="circle pink"></div>
  </div>

  <main>
    <h1>webcp network</h1>
  </main>

</body>
</html>
